version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
