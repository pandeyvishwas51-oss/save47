<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Save47 logo">
  <defs>
    <linearGradient id="save47-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0b0b14"/>
    </linearGradient>
    <linearGradient id="save47-stroke" x1="32" y1="10" x2="32" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.6" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="save47-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#save47-bg)"/>

  <!-- Soft glow behind the chevrons -->
  <g filter="url(#save47-glow)" opacity="0.55">
    <path d="M14 26 L32 36 L50 26" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Top chevron — faint -->
  <path d="M16 14 L32 24 L48 14" stroke="url(#save47-stroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35"/>

  <!-- Middle chevron — medium -->
  <path d="M14 28 L32 40 L50 28" stroke="url(#save47-stroke)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Bottom chevron — full -->
  <path d="M12 42 L32 56 L52 42" stroke="url(#save47-stroke)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
